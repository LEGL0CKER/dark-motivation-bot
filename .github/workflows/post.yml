name: Dark Motivation Bot

on:
  schedule:
    - cron: '50 12 * * *'   # 7:50 AM CDT → 8:00 AM Central
    - cron: '50 16 * * *'   # 11:50 AM CDT → 12:00 PM Central
    - cron: '50 0 * * *'    # 7:50 PM CDT → 8:00 PM Central
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: sudo apt-get update -y && sudo apt-get install -y --fix-missing ffmpeg

      - name: Install Python dependencies
        run: pip install -r music/requirements.txt

      - name: Build config.json
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          python3 -c "
          import json, os
          config = {
            'pexels_api_key':     os.environ['PEXELS_API_KEY'],
            'music_dir':          '.',
            'output_dir':         './output',
            'use_curated_quotes': True,
            'words_per_line':     3,
            'video_duration':     15,
            'music_volume':       0.0,
          }
          with open('music/config.json', 'w') as f:
              json.dump(config, f)
          print('music/config.json created')
          "

      - name: Run pipeline
        env:
          TIKTOK_CLIENT_KEY:    ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          TIKTOK_OPEN_ID:       ${{ secrets.TIKTOK_OPEN_ID }}
        run: cd music && python3 run.py
